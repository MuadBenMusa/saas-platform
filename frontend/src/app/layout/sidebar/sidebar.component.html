<aside
  id="primary-sidebar"
  class="sidebar"
  [class.is-collapsed]="collapsed()"
  [class.is-mobile-open]="mobileOpen"
>
  <div class="sidebar-header">
    <span class="sidebar-title">Workspace</span>
    <button
      type="button"
      class="collapse-button"
      [attr.aria-label]="collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      [attr.aria-pressed]="collapsed()"
      (click)="toggleCollapsed()"
    >
      <span aria-hidden="true">{{ collapsed() ? '›' : '‹' }}</span>
    </button>
  </div>

  <nav class="nav" aria-label="Primary navigation">
    <a routerLink="/dashboard" routerLinkActive="active" aria-label="Dashboard" title="Dashboard" (click)="handleNavigate()">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" focusable="false">
          <path d="M3 10.5 10 4l7 6.5v5.75A1.75 1.75 0 0 1 15.25 18h-2.5A1.75 1.75 0 0 1 11 16.25v-3.5H9v3.5A1.75 1.75 0 0 1 7.25 18h-2.5A1.75 1.75 0 0 1 3 16.25V10.5Z" />
        </svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </a>
    <a routerLink="/projects" routerLinkActive="active" aria-label="Projects" title="Projects" (click)="handleNavigate()">
      <span class="nav-icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" focusable="false">
          <path d="M4 4.75C4 3.78 4.78 3 5.75 3h8.5C15.22 3 16 3.78 16 4.75v10.5c0 .97-.78 1.75-1.75 1.75h-8.5C4.78 17 4 16.22 4 15.25V4.75Zm3 2.5A.75.75 0 0 0 7 8.75h6a.75.75 0 0 0 0-1.5H7Zm0 4A.75.75 0 0 0 7 12.75h6a.75.75 0 0 0 0-1.5H7Z" />
        </svg>
      </span>
      <span class="nav-label">Projects</span>
    </a>
  </nav>
</aside>
