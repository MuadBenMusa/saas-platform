<section class="empty-state">
  @if (icon) {
    <div class="empty-icon" aria-hidden="true">{{ icon }}</div>
  }

  <div>
    <h2>{{ title }}</h2>
    @if (message) {
      <p>{{ message }}</p>
    }
  </div>

  <div class="actions">
    @if (primaryActionLabel) {
      <button type="button" class="primary-action" (click)="primaryAction.emit()">
        {{ primaryActionLabel }}
      </button>
    }

    <ng-content />
  </div>
</section>
