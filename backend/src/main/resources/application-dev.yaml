spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/saas_postgres
    username: saas_user
    password: saas_password

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://127.0.0.1:8443/realms/oauth2-demos

app:
  security:
    login-success-redirect-uri: http://localhost:4200/dashboard
    post-logout-redirect-uri: http://localhost:4200/login?logout
